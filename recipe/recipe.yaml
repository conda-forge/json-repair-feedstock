schema_version: 1

context:
  name: json-repair
  version: "0.59.5"
  python_min: "3.10"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/json_repair-${{ version }}.tar.gz
  sha256: bb886ee054e99066be8a337b67a986b6a50d79be9a5ad37ae81966e698990784

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python 3.10.*
    - setuptools >=61.0
    - pip
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - json_repair
      pip_check: true
      python_version: ${{ python_min }}

about:
  summary: A package to repair broken json strings
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/mangiucugna/json_repair/

extra:
  recipe-maintainers:
    - jan-janssen
