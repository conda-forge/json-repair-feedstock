schema_version: 1

context:
  name: json-repair
  version: "0.59.8"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/json_repair-${{ version }}.tar.gz
  sha256: 447e946b235ba0689a7f3d7f057988adebae316711cfb4170c44c5ea38ed5dea

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=61.0
    - pip
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - json_repair
      pip_check: true
      python_version: ${{ python_min }}

about:
  summary: A package to repair broken json strings
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/mangiucugna/json_repair/

extra:
  recipe-maintainers:
    - jan-janssen
